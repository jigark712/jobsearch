    # Big tech (Google/Meta/Amazon/Microsoft/Apple/NVIDIA) deprioritized per owner:
    # F-1 grad targeting startups, not FAANG. YC + Series A AI startups are the focus.
    # If owner ever wants to re-add specific Workday tenants, format is:
    #   - {company: "name", url: "https://{tenant}.wdN.myworkdayjobs.com/{site}"}

external_aggregators:
  yc_jobs: "https://www.workatastartup.com/jobs"
  wellfound: "https://wellfound.com/jobs"
  builtin_boston: "https://www.builtinboston.com/jobs"
  jobright_ai:
    enabled: true
    note: |
      Secondary source only. Aggregates Greenhouse/Lever/Ashby (which we already pull
      directly). Pull daily, dedupe aggressively against Tier 1.
    url: "https://jobright.ai"
    auth: "requires logged-in session cookie (owner provides)"
    session_cookie_path: ".secrets/jobright_session.txt"
  simplify:
    enabled: false
    note: "Mostly stale or rewritten postings. Re-enable only if other sources dry up."
  github_repos:
    - "https://github.com/SimplifyJobs/New-Grad-Positions"
    - "https://github.com/jobright-ai/2025-Software-Engineer-New-Grad"
    - "https://github.com/SimplifyJobs/Summer2026-Internships"
    # cvrve/Summer2026-Internships and speedyapply/2026-AI-ML-Internships in the
    # original spec return 404. Owner can re-add if/when they find current repos.

handshake:
  enabled: true
  note: |
    Institution-locked. Access via owner's authenticated browser session, not API.
    Owner exports a session cookie weekly; re-auth when scraper fails.
  session_cookie_path: ".secrets/handshake_session.txt"
  poll_frequency: "daily"
  use_for: ["full_time", "fall_2026_internship"]

linkedin:
  do_not_scrape: true
  note: |
    LinkedIn cannot be scraped without risking owner's account.
    Legitimate uses:
    (1) RSS feeds for verified employer Jobs pages (owner adds manually).
    (2) Daily prompt asking owner to manually check "Posted in last 24 hours" filter.
    (3) Manual alumni/recruiter discovery for referrals.
  rss_feeds: []
  manual_check_prompts_daily: true
  manual_check_searches:
    # Targeted at startups — uses "Posted in last 24 hours" + size filter for <500 employees.
    # f_C = company filter, f_E = experience level (1=intern, 2=entry, 3=associate)
    # f_TPR = time posted (r86400 = 24h), f_WT = workplace type
    - {label: "AI Engineer · startup (<500) · 24h",
       url: "https://www.linkedin.com/jobs/search/?keywords=AI%20Engineer&f_TPR=r86400&f_E=2&f_C=&f_CF=startup&location=United%20States"}
    - {label: "ML Engineer · new grad · 24h",
       url: "https://www.linkedin.com/jobs/search/?keywords=Machine%20Learning%20Engineer%20new%20grad&f_TPR=r86400&f_E=2&location=United%20States"}
    - {label: "Founding Engineer · 24h",
       url: "https://www.linkedin.com/jobs/search/?keywords=founding%20engineer&f_TPR=r86400&location=United%20States"}
    - {label: "Forward Deployed Engineer · AI startups · 24h",
       url: "https://www.linkedin.com/jobs/search/?keywords=forward%20deployed%20engineer&f_TPR=r86400&location=United%20States"}
    - {label: "Boston · Software Intern part-time · 24h",
       url: "https://www.linkedin.com/jobs/search/?keywords=software%20intern&f_TPR=r86400&f_E=1&location=Boston%2C%20Massachusetts%2C%20United%20States"}

